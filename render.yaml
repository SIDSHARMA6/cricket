services:
  - type: web
    name: strapi-app
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: PUBLIC_URL
        value: https://cricket-1-zawr.onrender.com
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: DATABASE_HOST
        fromDatabase:
          name: strapi-postgres
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: strapi-postgres
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: strapi-postgres
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: strapi-postgres
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: strapi-postgres
          property: password
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false
      - key: APP_KEYS
        sync: false
      - key: API_TOKEN_SALT
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: TRANSFER_TOKEN_SALT
        sync: false
      - key: JWT_SECRET
        sync: false
    
  - type: pserv
    name: strapi-postgres
    env: postgres
    plan: starter
    databaseName: strapi
    databaseUser: strapi